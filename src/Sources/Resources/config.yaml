# Server port (CLIProxyAPI runs on 8318, ThinkingProxy forwards from 8317)
port: 8318

# Bind to localhost only for security (prevents exposure on public IPs)
host: 127.0.0.1

# Amp CLI integration (management requests only - login, user, threads)
amp-upstream-url: "https://ampcode.com"
amp-restrict-management-to-localhost: true

# Management API settings
remote-management:
  allow-remote: false
  secret-key: ""  # Leave empty to disable management API

# Authentication directory (stores OAuth tokens)
auth-dir: "~/.cli-proxy-api"

# Logging configuration
debug: false
logging-to-file: false

# Usage statistics
usage-statistics-enabled: true

# Network proxy (if needed for corporate networks)
proxy-url: ""

# Retry configuration
request-retry: 3

# Timeout for upstream provider requests
# Default: 10m. Set to "0" to disable timeout.
# Important for Extended Thinking requests which may take 5-10+ minutes.
request-timeout: "10m"

# Quota management
quota-exceeded:
  switch-project: true
  switch-preview-model: true

# OAuth providers for local subscriptions
# Claude, Codex (GPT), Gemini tokens in ~/.cli-proxy-api/ will be used
# No fallback - users must authenticate providers they want to use

# No API keys needed for OAuth-based providers
generative-language-api-key: []

# Devin provider (OpenAI-compatible bridge to Devin ACP WebSocket)
# The devin-bridge service runs locally and translates OpenAI-compatible
# requests into Devin ACP WebSocket (JSON-RPC 2.0) calls.
# Authenticate with `devin auth` to populate ~/.devin/credentials.toml,
# then start the bridge: python3 devin_bridge.py
openai-compatibility:
  - name: devin
    display-name: "Devin"
    base-url: "http://127.0.0.1:8419/v1"
    help-text: "Devin AI — use your Devin subscription. Run 'devin auth' first, then start the bridge service."
    icon-system: "brain.head.profile"
    api-key-entries:
      - api-key: "devin-bridge-no-key-needed"
    models:
